<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="pen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
  </defs>
  <!-- Circular background -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Pen nib body -->
  <g transform="translate(256,256) rotate(-40)">
    <!-- Pen shaft -->
    <rect x="-18" y="-160" width="36" height="200" rx="6" fill="url(#pen)" opacity="0.95"/>
    <!-- Pen nib triangle -->
    <polygon points="-18,40 18,40 0,90" fill="url(#pen)" opacity="0.95"/>
    <!-- Nib slit -->
    <line x1="0" y1="40" x2="0" y2="82" stroke="#0284c7" stroke-width="2.5" opacity="0.6"/>
    <!-- Pen grip lines -->
    <line x1="-14" y1="-10" x2="14" y2="-10" stroke="#0891b2" stroke-width="2" opacity="0.3"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="#0891b2" stroke-width="2" opacity="0.3"/>
    <line x1="-14" y1="10" x2="14" y2="10" stroke="#0891b2" stroke-width="2" opacity="0.3"/>
  </g>
  <!-- Handwriting stroke curve -->
  <path d="M150,340 Q200,300 240,330 Q280,360 310,320 Q340,280 380,310" 
        fill="none" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  <!-- Small ink dot -->
  <circle cx="380" cy="310" r="5" fill="white" opacity="0.8"/>
</svg>
